<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Pair Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 28px;
            padding: 40px 32px;
            max-width: 460px;
            width: 100%;
            border: 1px solid #ff6b00;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { 
            color: #ff6b00; 
            text-align: center; 
            font-size: 28px;
            margin-bottom: 8px;
        }
        .sub {
            color: #888;
            text-align: center;
            font-size: 14px;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 16px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #ff6b00;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #ff6b00;
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            background: #ff8c00;
            transform: translateY(-2px);
        }
        .code-box {
            font-size: 32px;
            text-align: center;
            letter-spacing: 8px;
            color: #ff6b00;
            background: #2a2a2a;
            padding: 24px;
            border-radius: 20px;
            margin: 20px 0;
            font-family: monospace;
            font-weight: bold;
        }
        .timer {
            text-align: center;
            color: #ff6b00;
            font-size: 14px;
            margin: 15px 0;
        }
        .hidden { display: none; }
        .loader {
            text-align: center;
            padding: 40px;
            color: #ff6b00;
        }
        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 20px;
        }
        .note {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 24px;
        }
        .btn-outline {
            background: #333;
            margin-top: 10px;
        }
        .btn-outline:hover {
            background: #444;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ WhatsApp Pair Code</h1>
        <div class="sub">Connect without scanning QR</div>
        
        <div id="step1">
            <input type="tel" id="phone" placeholder="Enter WhatsApp number (e.g., 9876543210)">
            <button onclick="generateCode()">Generate Pairing Code</button>
            <div class="note">Code valid for 10 minutes • WhatsApp must be active on your phone</div>
        </div>
        
        <div id="step2" class="hidden">
            <div class="code-box" id="pairingCode">---- ----</div>
            <div class="timer" id="timer">10:00 remaining</div>
            <button onclick="copyCode()">📋 Copy Code</button>
            <button onclick="reset()" class="btn-outline">🔄 New Code</button>
            <div class="note">Open WhatsApp → Settings → Linked Devices → Link with Phone Number</div>
        </div>
        
        <div id="loading" class="hidden">
            <div class="loader">
                <div class="spinner"></div>
                Requesting pairing code...
            </div>
        </div>
        
        <div id="error" class="hidden">
            <div class="error" id="errorMsg"></div>
            <button onclick="reset()" style="margin-top:20px;">Try Again</button>
        </div>
    </div>

    <script>
        let currentSession = null;
        let timerInterval = null;

        async function generateCode() {
            let phone = document.getElementById('phone').value.trim();
            if (!phone) {
                alert('Please enter your phone number');
                return;
            }
            phone = phone.replace(/\D/g, '');
            if (phone.length < 10 || phone.length > 15) {
                alert('Please enter a valid phone number (10-15 digits)');
                return;
            }

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('/request-pairing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone })
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error);
                
                currentSession = data.sessionId;
                document.getElementById('pairingCode').innerHTML = data.pairingCode;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                
                let timeLeft = data.expiresIn;
                const timerEl = document.getElementById('timer');
                
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft--;
                    const mins = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    timerEl.innerHTML = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')} remaining`;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        alert('Code expired. Generate a new one.');
                        reset();
                    }
                }, 1000);
                
                await navigator.clipboard.writeText(data.pairingCode);
                
            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('errorMsg').innerHTML = err.message;
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function copyCode() {
            const code = document.getElementById('pairingCode').innerHTML;
            navigator.clipboard.writeText(code);
            alert('✅ Code copied!');
        }

        function reset() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('phone').value = '';
            currentSession = null;
        }
    </script>
</body>
</html>
